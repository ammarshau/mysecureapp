<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SecureTask Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            position: relative;
            background-image: url('https://images.pexels.com/photos/1181263/pexels-photo-1181263.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Dark overlay for readability */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            z-index: 0;
        }
        
        .register-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 520px;
            margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        h2 {
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 22px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .password-requirements {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .requirement {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .requirement.valid {
            color: #28a745;
        }
        
        .requirement.invalid {
            color: #999;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        /* Password strength meter */
        .strength-meter {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }
        
        .strength-text {
            font-size: 11px;
            margin-top: 5px;
            text-align: right;
        }
        
        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
                margin: 15px;
            }
            .logo {
                font-size: 45px;
            }
            h2 {
                font-size: 24px;
            }
            .password-requirements {
                font-size: 10px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">✨</div>
        <h2>Create Your Account</h2>
        <p class="subtitle">Join SecureTask Pro and boost your productivity</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="POST" id="registerForm">
            {% csrf_token %}
            
            <div class="input-group">
                <label>👤 Username</label>
                <input type="text" name="username" id="username" placeholder="Choose a unique username" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>📧 Email (Optional)</label>
                <input type="email" name="email" id="email" placeholder="your@email.com" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" name="password" id="password" placeholder="Create a strong password" required>
                <div class="strength-meter">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText">Enter password</div>
                <div class="password-requirements">
                    <span class="requirement" id="reqLength">🔘 At least 8 characters</span>
                    <span class="requirement" id="reqUpper">🔘 Uppercase letter</span>
                    <span class="requirement" id="reqNumber">🔘 Number</span>
                </div>
            </div>
            
            <div class="input-group">
                <label>✓ Confirm Password</label>
                <input type="password" name="password_confirm" id="passwordConfirm" placeholder="Confirm your password" required>
                <div class="password-requirements">
                    <span class="requirement" id="reqMatch">🔘 Passwords match</span>
                </div>
            </div>
            
            <button type="submit" id="submitBtn">🚀 Register Now</button>
        </form>
        
        <div class="links">
            <a href="{% url 'login' %}">🔐 Already have an account? Sign in</a>
        </div>
    </div>
    
    <script>
        // Real-time password strength checker
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('passwordConfirm');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        
        // Requirement elements
        const reqLength = document.getElementById('reqLength');
        const reqUpper = document.getElementById('reqUpper');
        const reqNumber = document.getElementById('reqNumber');
        const reqMatch = document.getElementById('reqMatch');
        
        function checkPasswordStrength() {
            const password = passwordInput.value;
            let strength = 0;
            let validations = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                number: /[0-9]/.test(password)
            };
            
            // Update requirement UI
            if (validations.length) {
                reqLength.innerHTML = '✅ At least 8 characters';
                reqLength.classList.add('valid');
                strength++;
            } else {
                reqLength.innerHTML = '❌ At least 8 characters';
                reqLength.classList.remove('valid');
            }
            
            if (validations.upper) {
                reqUpper.innerHTML = '✅ Uppercase letter';
                reqUpper.classList.add('valid');
                strength++;
            } else {
                reqUpper.innerHTML = '❌ Uppercase letter';
                reqUpper.classList.remove('valid');
            }
            
            if (validations.number) {
                reqNumber.innerHTML = '✅ Number';
                reqNumber.classList.add('valid');
                strength++;
            } else {
                reqNumber.innerHTML = '❌ Number';
                reqNumber.classList.remove('valid');
            }
            
            // Update strength meter
            let percent = (strength / 3) * 100;
            strengthBar.style.width = percent + '%';
            
            if (strength === 0) {
                strengthBar.style.background = '#dc3545';
                strengthText.innerHTML = '🔴 Very Weak';
                strengthText.style.color = '#dc3545';
            } else if (strength === 1) {
                strengthBar.style.background = '#ffc107';
                strengthText.innerHTML = '🟡 Weak';
                strengthText.style.color = '#856404';
            } else if (strength === 2) {
                strengthBar.style.background = '#17a2b8';
                strengthText.innerHTML = '🟢 Good';
                strengthText.style.color = '#0c5460';
            } else if (strength === 3) {
                strengthBar.style.background = '#28a745';
                strengthText.innerHTML = '💪 Strong!';
                strengthText.style.color = '#155724';
            }
            
            // Check password match
            if (confirmInput.value.length > 0) {
                if (password === confirmInput.value) {
                    reqMatch.innerHTML = '✅ Passwords match';
                    reqMatch.classList.add('valid');
                } else {
                    reqMatch.innerHTML = '❌ Passwords do not match';
                    reqMatch.classList.remove('valid');
                }
            } else {
                reqMatch.innerHTML = '🔘 Passwords match';
                reqMatch.classList.remove('valid');
            }
        }
        
        passwordInput.addEventListener('input', checkPasswordStrength);
        confirmInput.addEventListener('input', checkPasswordStrength);
        
        // Form validation before submit
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            if (password.length < 8) {
                e.preventDefault();
                alert('Password must be at least 8 characters long!');
                return false;
            }
            
            if (password !== confirm) {
                e.preventDefault();
                alert('Passwords do not match!');
                return false;
            }
            
            return true;
        });
    </script>
</body>
</html>
